# /etc/nginx/sites-available/adversarydata.com
#
# STAGE 1 — Pre-SSL config. Use this BEFORE running certbot.
# Plain HTTP only — no ssl_* directives anywhere, so nginx -t won't fail
# with "cannot load certificate". After certbot succeeds, swap this file
# for the post-SSL version and reload nginx.
#
#   sudo certbot certonly --webroot -w /var/www/certbot \
#     -d adversarydata.com -d www.adversarydata.com

server {
    listen 80;
    listen [::]:80;
    server_name adversarydata.com www.adversarydata.com;

    # ACME http-01 challenge (certbot --webroot writes here)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Security (lightweight set; HSTS is intentionally NOT here yet)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 30m;

    # API
    location /api/ {
        proxy_pass http://localhost:4002;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;

        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:4002;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Main app
    location / {
        proxy_pass http://localhost:4002;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;

        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/adversarydata_access.log;
    error_log  /var/log/nginx/adversarydata_error.log;
}