# /etc/nginx/sites-available/adversarydata.com
#
# STAGE 2 — Post-SSL config. Apply ONLY AFTER certbot has successfully
# issued certificates for adversarydata.com and www.adversarydata.com.
#
#   sudo certbot certonly --webroot -w /var/www/certbot \
#     -d adversarydata.com -d www.adversarydata.com
#
# Then replace the pre-SSL conf with this file and reload:
#   sudo nginx -t && sudo systemctl reload nginx

# Redirect all plain HTTP -> HTTPS (canonical adversarydata.com)
server {
    listen 80;
    listen [::]:80;
    server_name adversarydata.com www.adversarydata.com;

    # Keep ACME challenge reachable for renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://adversarydata.com$request_uri;
    }
}

# Redirect www -> apex over HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.adversarydata.com;

    ssl_certificate     /etc/letsencrypt/live/adversarydata.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adversarydata.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://adversarydata.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name adversarydata.com;

    ssl_certificate     /etc/letsencrypt/live/adversarydata.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adversarydata.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Strong defaults
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    client_max_body_size 30m;

    # Optional: longer cache for Next.js build assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:4011;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass         http://127.0.0.1:4011;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
