# /etc/nginx/sites-available/adversarydata.com
#
# STAGE 1 — Pre-SSL config. Use this BEFORE running certbot.
# Plain HTTP only, no SSL block at all (so certbot's ACME http-01 challenge works
# and nginx doesn't fail to reload because of missing certs).
#
# After certbot succeeds, replace this file with adversarydata.com.conf
# (the post-SSL version) and reload nginx.

server {
    listen 80;
    listen [::]:80;
    server_name adversarydata.com www.adversarydata.com;

    # ACME http-01 challenge (certbot --webroot or --nginx will use this)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Larger upload limit so client documents/uploads aren't truncated
    client_max_body_size 30m;

    # Reverse-proxy everything to the Next.js app on port 4011
    location / {
        proxy_pass         http://127.0.0.1:4011;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        # WebSocket / HMR support (harmless in prod)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
